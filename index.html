<!DOCTYPE html>
<html>
<head>
    <title>Opening App...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .card { text-align: center; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
    <script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. Get the type of content (invite, profile, etc.)
        const type = urlParams.get('type'); 
        const id = urlParams.get('id'); // This could be the invite code or a userId

        if (type && id) {
            // 2. Build the dynamic deep link
            // Example: connectionapp://profile?id=user123
            // Example: connectionapp://invite?id=abc456
            window.location.href = `connectionapp://${type}?id=${id}`;
        } else {
            document.body.innerHTML = "<h1>Link Expired or Invalid</h1>";
        }
    };
</script>
</head>
<body>
    <div class="card">
        <h2>Connecting you...</h2>
        <p>If the app doesn't open automatically, make sure it's installed.</p>
    </div>
</body>
</html>
